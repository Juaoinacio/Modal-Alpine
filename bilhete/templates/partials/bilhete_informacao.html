<div x-data="{ openModal2: false }">
    <div class="flex justify-between">
        <h2 class="text-lg font-bold mb-4">{{title}}</h2>

        <button @click="open = false"
                class="p-2 bg-gray-300 rounded hover:bg-gray-400"
            >
            Fechar
        </button>
    </div>

    <p class="mb-4">Conteúdo do primeiro modal</p>

    <!-- Botão para abrir o segundo modal (nested) -->
    <button
        @click="openModal2 = true"
        hx-get="{% url 'detalhes' %}"
        hx-target="#modal-content-2"
        hx-swap="innerHTML"
        class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
    >
        Abrir Modal 2
    </button>

    <!-- SEGUNDO MODAL (NESTED) -->
    <div
        x-show="openModal2"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
        @click.self="openModal2 = false"
    >
        <!-- MODAL INTERNO -->
        <div class="bg-white p-6 rounded shadow-lg" style="height: 600px; width: 800px;">
            <!-- CONTEÚDO DO MODAL 2 -->
            <div id="modal-content-2">
                <!-- conteúdo carregado dinamicamente -->
            </div>
        </div>
    </div>

</div>
