{% extends "base.html" %}

{% block content %}

<div class="bilhetes-container ml-20">
    <form class="bilhete-form" hx-post="{% url "adicionar_bilhete" %}" hx-target="#bilhete-list">
        {% csrf_token %}
        <input type="text" name="titulo" placeholder="Digite um bilhete">
        <button type="submit" >Salvar</button>
    </form>

    <div id="bilhete-list">
        {% include "partials/bilhete-list.html" %}
    </div>
</div>

{% endblock %}
